# Applied by ./lab systemd, .\lab.ps1 systemd, or the compatible
# LAB_INIT=systemd workflow. Each default managed host then boots a real
# systemd as PID 1 (the Molecule/geerlingguy pattern), so
# ansible.builtin.service and ansible.builtin.systemd behave as they would
# on a full server.
#
# The price is weaker container isolation: privileged mode, the host cgroup
# namespace and a writable cgroupfs. Acceptable for a disposable lab that
# only ever listens on 127.0.0.1; do not reuse this pattern for services
# you expose.
#
# Hosts created with add-host keep the default sshd init either way.
services:
  atlas: &systemd-host
    privileged: true
    cgroup: host
    environment:
      LAB_INIT: systemd
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  beacon: *systemd-host
  ledger: *systemd-host
  vaultbox: *systemd-host
