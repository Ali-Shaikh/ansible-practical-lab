---
all:
  vars:
    # Key path as seen on the host. Run from the repo root with the
    # OpenSSH client installed, e.g.
    #   ansible all -i inventory/local -m ansible.builtin.ping
    ansible_ssh_private_key_file: .lab/ssh/id_ed25519
  children:
    linux:
      hosts:
        atlas:
          ansible_host: 127.0.0.1
          ansible_port: 2222
        beacon:
          ansible_host: 127.0.0.1
          ansible_port: 2223
        ledger:
          ansible_host: 127.0.0.1
          ansible_port: 2224
        vaultbox:
          ansible_host: 127.0.0.1
          ansible_port: 2225
    web:
      hosts:
        beacon:
    database:
      hosts:
        ledger:
    secrets:
      hosts:
        vaultbox:
