---
# Phase 3 Capstone: Multi-tier like deployment using roles.
# Demonstrates composition of common + web, cross-group facts, verification.
# Run:
#   LAB_INIT=systemd ./lab up
#   ./lab play playbooks/50_capstone.yml
- name: Baseline all Linux hosts (common role)
  hosts: linux
  become: true
  gather_facts: true
  roles:
    - common

- name: Deploy web tier
  hosts: web
  become: true
  gather_facts: true
  roles:
    - web

- name: Capstone verification (simulates multi-tier health)
  hosts: web
  become: false
  gather_facts: false
  tasks:
    - name: Verify web service responds
      ansible.builtin.uri:
        url: "http://127.0.0.1/"
        return_content: true
      register: web_health
      until: web_health.status == 200
      retries: 5
      delay: 2

    - name: Assert content from role template
      ansible.builtin.assert:
        that:
          - "'Served by' in web_health.content"
        fail_msg: "Capstone web content not as expected from web role template."

- name: Report capstone success
  hosts: all
  gather_facts: false
  tasks:
    - name: Capstone complete
      ansible.builtin.debug:
        msg: "Phase 3 capstone passed on {{ inventory_hostname }}. Ready for pro modules."