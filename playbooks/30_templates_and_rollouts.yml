---
# Article 6: Templates, Configuration Changes and Safe Rollouts
# Demonstrates:
# - Jinja2 templates (in roles and play)
# - Serial for staged rollouts
# - Validation before applying changes (nginx -t style)
# - changed_when and failed_when
# - Using --limit and reading changed/ok output
#
# Usage (systemd mode recommended for service work):
#   LAB_INIT=systemd ./lab up
#   ./lab play playbooks/30_templates_and_rollouts.yml
#   ./lab play playbooks/30_templates_and_rollouts.yml --limit beacon
#   ./lab play playbooks/30_templates_and_rollouts.yml --serial 1
- name: Apply baseline using common role (shows role + template)
  hosts: linux
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: [baseline, common, template]

- name: Deploy and configure web service using roles + advanced templates
  hosts: web
  become: true
  gather_facts: true
  serial: 1   # Staged rollout - change one host at a time
  any_errors_fatal: true

  roles:
    - role: web
      tags: [web, template, service]

  tasks:
    - name: Validate generated nginx configuration before reload
      ansible.builtin.command:
        cmd: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0
      notify: Reload web server
      tags: [web, validate]

    - name: Deploy a dynamic lab status file from standalone playbook template
      ansible.builtin.template:
        src: templates/lab_status.j2
        dest: /etc/ansible-lab/rollout-status.yml
        owner: root
        group: root
        mode: "0644"
      tags: [template, demo]

    - name: Deploy a custom health page (template from role)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/web/templates/index.html.j2"
        dest: /var/www/html/rollout-demo.html
        owner: root
        group: root
        mode: "0644"
      notify: Reload web server
      tags: [template, demo]

    - name: Demonstrate changed_when for a non-module command
      ansible.builtin.shell: |
        echo "Current time on {{ inventory_hostname }}: $(date)" > /tmp/ansible-timestamp.txt
      register: timestamp_result
      changed_when: true   # Force recognition of change (or use checksum in real life)
      tags: [demo, changed_when]

- name: Verify rollout results (runs after serial batches)
  hosts: web
  become: false
  gather_facts: false

  tasks:
    - name: Check that the health endpoint responds
      ansible.builtin.uri:
        url: "http://{{ ansible_host | default(inventory_hostname) }}:{{ web_listen_port | default(8080) }}/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 5
      delay: 2
      tags: [verify]
