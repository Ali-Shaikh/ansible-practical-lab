[defaults]
inventory = inventory/lab
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
interpreter_python = auto_silent
# Include top-level roles/ for playbooks in subdirs (e.g. playbooks/30_*.yml)
# Per official: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#default-roles-path
roles_path = ./roles

[ssh_connection]
pipelining = True
