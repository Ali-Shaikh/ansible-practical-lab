---
# Molecule scenario for testing the common role using the lab's existing hosts (delegated driver).
# Run from the lab control node (forge):
#   ./lab molecule test -s common
#
# Prerequisites:
#   LAB_INIT=systemd ./lab up   (recommended for full role coverage)
#   ./lab up
#
# See official docs:
# https://docs.ansible.com/projects/molecule/
# https://docs.ansible.com/projects/molecule/configuration/
driver:
  name: default
  options:
    managed: false  # Use pre-existing lab hosts (delegated pattern per official Molecule docs)
platforms:
  - name: atlas
    # Delegated - Molecule will not manage; we provide connection via inventory above
    groups:
      - linux
provisioner:
  name: ansible
  config_options:
    defaults:
      host_key_checking: false
  env:
    ANSIBLE_CONFIG: ansible.cfg
    ANSIBLE_SSH_ARGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  inventory:
    hosts:
      atlas:
        ansible_host: atlas
        ansible_user: learner
        ansible_ssh_private_key_file: /tmp/lab-ssh/id_ed25519
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    groups:
      linux:
        hosts:
          atlas: {}
  playbooks:
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
scenario:
  name: common
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
# Note: create/destroy are no-op because we use the pre-existing lab hosts via delegated.
# The lab provides the SSH and inventory.