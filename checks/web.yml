---
# Self-check example for web role.
- name: Check web role
  hosts: web
  become: false
  gather_facts: false
  tasks:
    - name: Web endpoint healthy
      ansible.builtin.uri:
        url: http://127.0.0.1/
        status_code: 200
      register: r
      failed_when: r.status != 200 or 'Served by' not in (r.content | string)

    - name: Check site config
      ansible.builtin.stat:
        path: /etc/nginx/sites-enabled/ansible-lab.conf
      register: s
      failed_when: not s.stat.exists | default(false)

    - name: Web check passed
      ansible.builtin.debug:
        msg: "Web role check passed"